name: Build

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build on ${{ matrix.os }} with Java ${{ matrix.java.version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        java: [
          { 'version': '17' },
          { 'version': '21' },
          { 'version': '25' },
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Prepare git
        run: git config --global core.autocrlf false
        if: startsWith(matrix.os, 'windows')

      - uses: actions/checkout@v6
      - name: Set up JDK ${{matrix.java.version}}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{matrix.java.version}}
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw -B clean verify -Dno-format
